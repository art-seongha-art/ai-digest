<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>주간 AI 웹진 아카이브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
        :root{
          --bg:#0b1020;--bg-soft:#111832;--panel:#11172a;--panel-2:#161f36;--text:#edf2ff;
          --muted:#93a0bb;--line:rgba(255,255,255,.09);--shadow:0 24px 80px rgba(2,6,23,.32);
        }
        *{box-sizing:border-box} html{scroll-behavior:smooth}
        body{margin:0;color:var(--text);background:
          radial-gradient(circle at top left, rgba(65,156,255,.18), transparent 30%),
          radial-gradient(circle at top right, rgba(255,123,92,.16), transparent 28%),
          linear-gradient(180deg,#09101d 0%,#0d1324 40%,#0a1020 100%);
          font-family:"IBM Plex Sans KR","Noto Sans KR",system-ui,sans-serif;line-height:1.65}
        a{color:inherit;text-decoration:none}
        img{display:block;max-width:100%}
        .shell{width:min(1180px,calc(100vw - 32px));margin:0 auto 96px}
        .hero{padding:42px 0 28px}
        .eyebrow{display:inline-flex;gap:8px;align-items:center;padding:8px 14px;border-radius:999px;
          background:rgba(255,255,255,.06);border:1px solid var(--line);color:#d7deef;font-size:13px}
        .hero h1{font-family:"Space Grotesk","IBM Plex Sans KR",sans-serif;font-size:clamp(40px,6vw,74px);
          line-height:.96;letter-spacing:-.04em;margin:18px 0 14px;max-width:11ch}
        .hero-grid{display:grid;grid-template-columns:1.25fr .85fr;gap:18px}
        .hero-card,.summary-card,.archive-card,.story-card,.empty-card{
          background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
          border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);backdrop-filter:blur(18px)
        }
        .hero-card{padding:28px}
        .hero-copy{font-size:clamp(18px,2.1vw,24px);max-width:32ch;color:#f7f9ff}
        .hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
        .meta-pill,.nav-pill,.mini-pill{
          display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;
          background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:13px;color:#c5cfe5
        }
        .summary-card{padding:24px}
        .summary-card h2,.section-head h2,.archive-head h2{
          font-family:"Space Grotesk","IBM Plex Sans KR",sans-serif;letter-spacing:-.03em;margin:0 0 10px;font-size:28px
        }
        .summary-card ul{margin:16px 0 0;padding-left:18px;color:#d8def0}
        .section-nav{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
        .nav-pill{transition:.18s transform ease,.18s background ease}
        .nav-pill:hover{transform:translateY(-2px);background:rgba(255,255,255,.11)}
        .section{padding:20px 0 0}
        .section-head{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start;margin-bottom:18px}
        .section-tag{
          display:inline-flex;align-items:center;justify-content:center;min-width:74px;padding:10px 14px;
          border-radius:16px;background:color-mix(in srgb,var(--accent) 16%, transparent);
          border:1px solid color-mix(in srgb,var(--accent) 46%, transparent);color:#fff;font-size:13px;font-weight:700
        }
        .section-note{color:#d9e1f4;margin:4px 0 0}
        .story-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
        .story-card{overflow:hidden}
        .story-visual{aspect-ratio:16/10;background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02))}
        .story-visual img{width:100%;height:100%;object-fit:cover}
        .story-body{padding:22px}
        .story-meta{display:flex;flex-wrap:wrap;gap:8px;color:#95a2bf;font-size:13px;margin-bottom:12px}
        .story-title{font-family:"Space Grotesk","IBM Plex Sans KR",sans-serif;font-size:28px;line-height:1.02;
          letter-spacing:-.03em;margin:0 0 14px}
        .story-body p{margin:0 0 12px;color:#dbe3f5}
        .story-kicker{color:#fff0cd}
        .story-actions{display:flex;flex-wrap:wrap;gap:10px;padding-top:8px}
        .story-link,.secondary-link{
          display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:14px;
          background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:14px
        }
        .story-link{background:color-mix(in srgb,var(--accent) 14%, rgba(255,255,255,.04));border-color:color-mix(in srgb,var(--accent) 40%, transparent)}
        .story-generated{font-size:12px;color:#a8ffd7}
        .overflow-wrap{margin-top:14px;padding:16px 18px;border:1px dashed rgba(255,255,255,.14);border-radius:20px;color:#cfd7eb}
        .overflow-wrap h3{margin:0 0 10px;font-size:15px;color:#fff}
        .overflow-wrap ul{margin:0;padding-left:18px}
        .empty-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-top:14px}
        .empty-card{padding:16px 18px;color:#cbd4e8}
        .archive-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
        .archive-card{padding:18px 18px 20px}
        .archive-card strong{display:block;font-size:22px;font-family:"Space Grotesk","IBM Plex Sans KR",sans-serif}
        .archive-card span{display:block;color:var(--muted);margin-top:4px}
        .footer{padding:34px 0 0;color:var(--muted);font-size:13px}
        @media (max-width: 920px){
          .hero-grid,.story-grid{grid-template-columns:1fr}
          .hero h1{max-width:none}
        }
        </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <span class="eyebrow">Archive</span>
      <h1>주간 AI 웹진 아카이브</h1>
      <div class="hero-grid">
        <section class="hero-card">
          <div class="hero-copy">한 주씩 끊어서 읽는 AI 업데이트 로그입니다. 최신호부터 과거 호까지 카드형으로 훑어볼 수 있습니다.</div>
          <div class="hero-meta">
            <a class="meta-pill" href="./latest.html">최신호 보기</a>
            <a class="meta-pill" href="../index.html">웹진 홈</a>
          </div>
        </section>
        <aside class="summary-card">
          <h2>지금 열어볼 호</h2>
          <p>가장 최근 발행된 호는 <strong>2026-03-29</strong>입니다.</p>
        </aside>
      </div>
    </header>
    <main><section class="section"><div class="archive-grid"><a class="archive-card" href="./2026-03-29.html"><strong>2026-03-29</strong><span>주간 AI 웹진</span></a></div></section></main>
    <footer class="footer">Generated by paper_agent</footer>
  </div>
</body>
</html>
