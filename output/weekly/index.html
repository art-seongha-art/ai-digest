<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>주간 AI 웹진 아카이브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
        :root{
          --bg:#ffffff;--bg-soft:#ffffff;--panel:#ffffff;--panel-2:#ffffff;--text:#101828;
          --muted:#667085;--line:rgba(16,24,40,.07);--shadow:0 12px 30px rgba(15,23,42,.05);
        }
        *{box-sizing:border-box} html{scroll-behavior:smooth}
        body{margin:0;color:var(--text);background:#fff;
          font-family:"Plus Jakarta Sans","Noto Sans KR",system-ui,sans-serif;line-height:1.7}
        a{color:inherit;text-decoration:none}
        img{display:block;max-width:100%}
        .shell{width:min(1120px,calc(100vw - 32px));margin:0 auto 88px}
        .hero{padding:38px 0 26px}
        .eyebrow{display:inline-flex;gap:8px;align-items:center;padding:8px 14px;border-radius:999px;
          background:rgba(255,255,255,.92);border:1px solid var(--line);color:#344054;font-size:13px;
          box-shadow:0 4px 12px rgba(15,23,42,.03)}
        .hero h1{font-family:"Manrope","Plus Jakarta Sans",sans-serif;font-size:clamp(38px,5.8vw,72px);
          line-height:.94;letter-spacing:-.055em;margin:18px 0 14px;max-width:10ch}
        .hero-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
        .hero-card,.summary-card,.archive-card,.story-card,.empty-card{
          background:#fff;
          border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow)
        }
        .hero-card{padding:34px}
        .hero-copy{font-size:clamp(20px,2.15vw,27px);max-width:29ch;color:#101828;font-weight:600;letter-spacing:-.025em}
        .hero-card p{margin:16px 0 0;color:#475467}
        .hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
        .meta-pill,.nav-pill,.mini-pill{
          display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;
          background:#fff;border:1px solid var(--line);font-size:13px;color:#344054
        }
        .summary-card{padding:28px}
        .summary-card h2,.section-head h2,.archive-head h2{
          font-family:"Manrope","Plus Jakarta Sans",sans-serif;letter-spacing:-.04em;margin:0 0 10px;font-size:28px
        }
        .summary-card p{margin:0;color:#475467}
        .summary-card ul{margin:16px 0 0;padding-left:18px;color:#344054}
        .section-nav{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
        .nav-pill{transition:.18s transform ease,.18s background ease,.18s box-shadow ease}
        .nav-pill:hover{transform:translateY(-2px);background:#fff;box-shadow:0 10px 18px rgba(15,23,42,.06)}
        .section{padding:26px 0 0}
        .section-head{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start;margin-bottom:18px}
        .section-tag{
          display:inline-flex;align-items:center;justify-content:center;min-width:74px;padding:10px 14px;
          border-radius:15px;background:color-mix(in srgb,var(--accent) 9%, white);
          border:1px solid color-mix(in srgb,var(--accent) 22%, rgba(15,23,42,.05));color:#19304d;font-size:13px;font-weight:700
        }
        .section-note{color:#667085;margin:4px 0 0}
        .story-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
        .story-card{overflow:hidden;display:flex;flex-direction:column}
        .story-visual{aspect-ratio:16/10;background:
          linear-gradient(145deg,color-mix(in srgb,var(--accent) 7%, white),#ffffff)}
        .story-visual img{width:100%;height:100%;object-fit:cover}
        .story-body{padding:24px 24px 26px}
        .story-meta{display:flex;flex-wrap:wrap;gap:8px;color:#667085;font-size:13px;margin-bottom:12px}
        .story-title{font-family:"Manrope","Plus Jakarta Sans",sans-serif;font-size:28px;line-height:1.04;
          letter-spacing:-.03em;margin:0 0 14px}
        .story-body p{margin:0 0 12px;color:#344054}
        .story-kicker{color:#475467;padding-left:14px;border-left:3px solid color-mix(in srgb,var(--accent) 36%, #cbd5e1)}
        .story-actions{display:flex;flex-wrap:wrap;gap:10px;padding-top:8px}
        .story-link,.secondary-link{
          display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:14px;
          background:#fff;border:1px solid var(--line);font-size:14px;color:#223247
        }
        .story-link{background:color-mix(in srgb,var(--accent) 9%, white);border-color:color-mix(in srgb,var(--accent) 24%, rgba(15,23,42,.05))}
        .story-generated{font-size:12px;color:#0f9f6e}
        .overflow-wrap{margin-top:14px;padding:16px 18px;border:1px dashed rgba(15,23,42,.10);border-radius:20px;color:#475467;background:#fff}
        .overflow-wrap h3{margin:0 0 10px;font-size:15px;color:#162033}
        .overflow-wrap ul{margin:0;padding-left:18px}
        .empty-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-top:14px}
        .empty-card{padding:16px 18px;color:#475467;background:#fff}
        .empty-card .muted{color:#98a2b3}
        .archive-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
        .archive-card{padding:18px 18px 20px}
        .archive-card strong{display:block;font-size:22px;font-family:"Manrope","Plus Jakarta Sans",sans-serif}
        .archive-card span{display:block;color:var(--muted);margin-top:4px}
        .footer{padding:34px 0 0;color:var(--muted);font-size:13px}
        @media (max-width: 920px){
          .hero-grid,.story-grid{grid-template-columns:1fr}
          .hero h1{max-width:none}
        }
        </style>
</head>
